apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: plane-ns

resources:
  - ../../base
  - vars.yaml
  - secrets-vars.yaml

# Include ALL infrastructure components (local)
components:
  - ../../components/email-service
  # Optional: enable EKS IRSA role annotation on plane-srv-account
  - ../../components/eks-irsa-plane-serviceaccount
  # Ingress controller: pick ONE to patch plane Ingress (install the controller yourself)
  - ../../components/ingress-nginx
  # - ../../components/aws-load-balancer-controller
  # Optional: enable when providing static DATABASE_URL; omit when using IRSA/EKS Pod Identity with RDS_SECRET_ARN
  # - ../../components/static-db-url
  # Optional: enable when using external OpenSearch with username/password auth
  # - ../../components/opensearch-external-auth
  # Optional: enable when using static AWS keys for S3; omit when using IRSA via eks-irsa-plane-serviceaccount
  # - ../../components/s3-static-credentials
  # Pi service (AI/Intelligence features)
  - ../../components/pi-service
  # Optional: enable non-root security context on all workload Deployments (recommended for hardened environments)
  # Keep this AFTER pi-service so it patches pi workloads too.
  - ../../components/nonroot-security-context
  # Uncomment these if you want to deploy the infrastructure components locally
  # - ../../components/postgres
  # - ../../components/redis
  # - ../../components/rabbitmq
  # - ../../components/minio
  # - ../../components/opensearch

# ============================================================
# APPLICATION VERSION - CUSTOMIZE THIS FOR UPGRADES
# ============================================================
# Current Version: v2.3.4 (also defined in vars.yaml for ConfigMap replacements)
# ============================================================
images:
  - name: makeplane/backend-commercial
    newTag: v2.3.4
  - name: makeplane/web-commercial
    newTag: v2.3.4
  - name: makeplane/space-commercial
    newTag: v2.3.4
  - name: makeplane/admin-commercial
    newTag: v2.3.4
  - name: makeplane/live-commercial
    newTag: v2.3.4
  - name: makeplane/monitor-commercial
    newTag: v2.3.4
  - name: makeplane/silo-commercial
    newTag: v2.3.4
  - name: makeplane/email-commercial
    newTag: v2.3.4
  - name: makeplane/plane-pi-commercial
    newTag: v2.3.4
  - name: makeplane/iframely
    newTag: v1.2.0  # iframely uses separate versioning

# All configuration is now handled by replacements from vars.yaml and secrets-vars.yaml
# No manual patches needed!

# ============================================================
# REPLACEMENTS - Using vars.yaml and secrets-vars.yaml as source of truth
# ============================================================
# This feature automatically replaces values across multiple resources
#
# vars.yaml (ConfigMap) - Non-sensitive values:
#   - APP_VERSION, APP_DOMAIN, NAMESPACE, INGRESS_CLASS
#
# secrets-vars.yaml (Secret) - Sensitive values:
#   - DATABASE_URL, REDIS_URL, AMQP_URL, OpenSearch creds, etc.
# ============================================================
replacements:
  # ====== FROM vars.yaml (ConfigMap) ======
  # Replace APP_VERSION in plane-monitor-vars ConfigMap
  - source:
      kind: ConfigMap
      name: overlay-vars
      fieldPath: data.APP_VERSION
    targets:
      - select:
          kind: ConfigMap
          name: plane-monitor-vars
        fieldPaths:
          - data.APP_VERSION
      - select:
          kind: ConfigMap
          name: plane-app-vars
        fieldPaths:
          - data.APP_VERSION

  # Replace APP_DOMAIN in ConfigMaps
  - source:
      kind: ConfigMap
      name: overlay-vars
      fieldPath: data.APP_DOMAIN
    targets:
      - select:
          kind: ConfigMap
          name: plane-app-vars
        fieldPaths:
          - data.APP_DOMAIN
      - select:
          kind: ConfigMap
          name: plane-monitor-vars
        fieldPaths:
          - data.APP_DOMAIN

  # Replace APP_DOMAIN in Ingress host
  - source:
      kind: ConfigMap
      name: overlay-vars
      fieldPath: data.APP_DOMAIN
    targets:
      - select:
          kind: Ingress
        fieldPaths:
          - spec.rules.0.host

  # Replace INGRESS_CLASS in Ingress
  - source:
      kind: ConfigMap
      name: overlay-vars
      fieldPath: data.INGRESS_CLASS
    targets:
      - select:
          kind: Ingress
        fieldPaths:
          - spec.ingressClassName

  # Replace WEB_URL in plane-app-vars
  - source:
      kind: ConfigMap
      name: overlay-vars
      fieldPath: data.WEB_URL
    targets:
      - select:
          kind: ConfigMap
          name: plane-app-vars
        fieldPaths:
          - data.WEB_URL
      - select:
          kind: ConfigMap
          name: plane-silo-vars
        fieldPaths:
          - data.APP_BASE_URL
          - data.SILO_API_BASE_URL


  # Replace CORS_ALLOWED_ORIGINS in plane-app-vars
  - source:
      kind: ConfigMap
      name: overlay-vars
      fieldPath: data.CORS_ALLOWED_ORIGINS
    targets:
      - select:
          kind: ConfigMap
          name: plane-app-vars
        fieldPaths:
          - data.CORS_ALLOWED_ORIGINS

  # Replace IS_AIRGAPPED in plane-monitor-vars
  - source:
      kind: ConfigMap
      name: overlay-vars
      fieldPath: data.IS_AIRGAPPED
    targets:
      - select:
          kind: ConfigMap
          name: plane-monitor-vars
        fieldPaths:
          - data.IS_AIRGAPPED
      - select:
          kind: ConfigMap
          name: plane-app-vars
        fieldPaths:
          - data.IS_AIRGAPPED

  - source:
      kind: ConfigMap
      name: overlay-vars
      fieldPath: data.AWS_SECRET_CACHE_TTL
    targets:
      - select:
          kind: ConfigMap
          name: plane-app-vars
        fieldPaths:
          - data.AWS_SECRET_CACHE_TTL
      - select:
          kind: ConfigMap
          name: plane-silo-vars
        fieldPaths:
          - data.AWS_SECRET_CACHE_TTL
      - select:
          kind: ConfigMap
          name: plane-live-vars
        fieldPaths:
          - data.AWS_SECRET_CACHE_TTL

  # Monitor StatefulSet storage class (from vars.yaml)
  - source:
      kind: ConfigMap
      name: overlay-vars
      fieldPath: data.MONITOR_STORAGE_CLASS
    targets:
      - select:
          kind: StatefulSet
          name: plane-monitor
        fieldPaths:
          - spec.volumeClaimTemplates.0.spec.storageClassName

  # PRIME_HOST in plane-app-vars (from vars.yaml)
  - source:
      kind: ConfigMap
      name: overlay-vars
      fieldPath: data.PRIME_HOST
    targets:
      - select:
          kind: ConfigMap
          name: plane-app-vars
        fieldPaths:
          - data.PRIME_HOST
      - select:
          kind: ConfigMap
          name: plane-monitor-vars
        fieldPaths:
          - data.PRIME_HOST

  # PI_BASE_URL in plane-app-vars (from vars.yaml)
  - source:
      kind: ConfigMap
      name: overlay-vars
      fieldPath: data.PI_BASE_URL
    targets:
      - select:
          kind: ConfigMap
          name: plane-app-vars
        fieldPaths:
          - data.PI_BASE_URL

  # Pi service: PI_BASE_URL from vars -> plane-pi-api-vars.PLANE_API_HOST only
  - source:
      kind: ConfigMap
      name: overlay-vars
      fieldPath: data.PI_BASE_URL
    targets:
      - select:
          kind: ConfigMap
          name: plane-pi-api-vars
        fieldPaths:
          - data.PLANE_API_HOST

  # Pi service: OAuth redirect URI from vars -> plane-pi-api-vars.PLANE_OAUTH_REDIRECT_URI
  - source:
      kind: ConfigMap
      name: overlay-vars
      fieldPath: data.PI_OAUTH_REDIRECT_URI
    targets:
      - select:
          kind: ConfigMap
          name: plane-pi-api-vars
        fieldPaths:
          - data.PLANE_OAUTH_REDIRECT_URI

  # Pi service: custom LLM API key placeholder (from vars.yaml)
  - source:
      kind: ConfigMap
      name: overlay-vars
      fieldPath: data.MODEL_CUSTOM_LLM_API_KEY
    targets:
      - select:
          kind: ConfigMap
          name: plane-pi-api-vars
        fieldPaths:
          - data.MODEL_CUSTOM_LLM_API_KEY

  - source:
      kind: Secret
      name: overlay-secret-vars
      fieldPath: stringData.PI_INTERNAL_SECRET
    targets:
      - select:
          kind: Secret
          name: plane-app-secrets
        fieldPaths:
          - stringData.PI_INTERNAL_SECRET
      - select:
          kind: Secret
          name: plane-pi-api-secrets
        fieldPaths:
          - stringData.PI_INTERNAL_SECRET

  # AWS Secrets Manager key mappings for pi service (from PI-specific keys in vars.yaml)
  - source:
      kind: ConfigMap
      name: overlay-vars
      fieldPath: data.PI_RABBITMQ_USER_KEY
    targets:
      - select:
          kind: ConfigMap
          name: plane-pi-api-vars
        fieldPaths:
          - data.RABBITMQ_USER_KEY

  - source:
      kind: ConfigMap
      name: overlay-vars
      fieldPath: data.PI_RABBITMQ_PASSWORD_KEY
    targets:
      - select:
          kind: ConfigMap
          name: plane-pi-api-vars
        fieldPaths:
          - data.RABBITMQ_PASSWORD_KEY

  - source:
      kind: ConfigMap
      name: overlay-vars
      fieldPath: data.PI_RDS_DB_HOST_KEY
    targets:
      - select:
          kind: ConfigMap
          name: plane-pi-api-vars
        fieldPaths:
          - data.RDS_DB_HOST_KEY

  - source:
      kind: ConfigMap
      name: overlay-vars
      fieldPath: data.PI_RDS_DB_NAME_KEY
    targets:
      - select:
          kind: ConfigMap
          name: plane-pi-api-vars
        fieldPaths:
          - data.RDS_DB_NAME_KEY

  - source:
      kind: ConfigMap
      name: overlay-vars
      fieldPath: data.PI_RDS_DB_PASSWORD_KEY
    targets:
      - select:
          kind: ConfigMap
          name: plane-pi-api-vars
        fieldPaths:
          - data.RDS_DB_PASSWORD_KEY

  - source:
      kind: ConfigMap
      name: overlay-vars
      fieldPath: data.PI_RDS_DB_PORT_KEY
    targets:
      - select:
          kind: ConfigMap
          name: plane-pi-api-vars
        fieldPaths:
          - data.RDS_DB_PORT_KEY

  - source:
      kind: ConfigMap
      name: overlay-vars
      fieldPath: data.PI_RDS_DB_USERNAME_KEY
    targets:
      - select:
          kind: ConfigMap
          name: plane-pi-api-vars
        fieldPaths:
          - data.RDS_DB_USERNAME_KEY

  - source:
      kind: ConfigMap
      name: overlay-vars
      fieldPath: data.PI_FOLLOWER_RDS_DB_HOST_KEY
    targets:
      - select:
          kind: ConfigMap
          name: plane-pi-api-vars
        fieldPaths:
          - data.FOLLOWER_RDS_DB_HOST_KEY

  - source:
      kind: ConfigMap
      name: overlay-vars
      fieldPath: data.PI_FOLLOWER_RDS_DB_NAME_KEY
    targets:
      - select:
          kind: ConfigMap
          name: plane-pi-api-vars
        fieldPaths:
          - data.FOLLOWER_RDS_DB_NAME_KEY

  - source:
      kind: ConfigMap
      name: overlay-vars
      fieldPath: data.PI_FOLLOWER_RDS_DB_PASSWORD_KEY
    targets:
      - select:
          kind: ConfigMap
          name: plane-pi-api-vars
        fieldPaths:
          - data.FOLLOWER_RDS_DB_PASSWORD_KEY

  - source:
      kind: ConfigMap
      name: overlay-vars
      fieldPath: data.PI_FOLLOWER_RDS_DB_PORT_KEY
    targets:
      - select:
          kind: ConfigMap
          name: plane-pi-api-vars
        fieldPaths:
          - data.FOLLOWER_RDS_DB_PORT_KEY

  - source:
      kind: ConfigMap
      name: overlay-vars
      fieldPath: data.PI_FOLLOWER_RDS_DB_USERNAME_KEY
    targets:
      - select:
          kind: ConfigMap
          name: plane-pi-api-vars
        fieldPaths:
          - data.FOLLOWER_RDS_DB_USERNAME_KEY

  # AWS Secrets Manager key mappings for main app (from vars.yaml)
  - source:
      kind: ConfigMap
      name: overlay-vars
      fieldPath: data.REDIS_AUTH_TOKEN_KEY
    targets:
      - select:
          kind: ConfigMap
          name: plane-app-vars
        fieldPaths:
          - data.REDIS_AUTH_TOKEN_KEY

  - source:
      kind: ConfigMap
      name: overlay-vars
      fieldPath: data.RABBITMQ_USER_KEY
    targets:
      - select:
          kind: ConfigMap
          name: plane-app-vars
        fieldPaths:
          - data.RABBITMQ_USER_KEY

  - source:
      kind: ConfigMap
      name: overlay-vars
      fieldPath: data.RABBITMQ_PASSWORD_KEY
    targets:
      - select:
          kind: ConfigMap
          name: plane-app-vars
        fieldPaths:
          - data.RABBITMQ_PASSWORD_KEY

  - source:
      kind: ConfigMap
      name: overlay-vars
      fieldPath: data.RDS_DB_NAME_KEY
    targets:
      - select:
          kind: ConfigMap
          name: plane-app-vars
        fieldPaths:
          - data.RDS_DB_NAME_KEY

  - source:
      kind: ConfigMap
      name: overlay-vars
      fieldPath: data.RDS_DB_HOST_KEY
    targets:
      - select:
          kind: ConfigMap
          name: plane-app-vars
        fieldPaths:
          - data.RDS_DB_HOST_KEY

  - source:
      kind: ConfigMap
      name: overlay-vars
      fieldPath: data.RDS_DB_PASSWORD_KEY
    targets:
      - select:
          kind: ConfigMap
          name: plane-app-vars
        fieldPaths:
          - data.RDS_DB_PASSWORD_KEY

  - source:
      kind: ConfigMap
      name: overlay-vars
      fieldPath: data.RDS_DB_PORT_KEY
    targets:
      - select:
          kind: ConfigMap
          name: plane-app-vars
        fieldPaths:
          - data.RDS_DB_PORT_KEY

  - source:
      kind: ConfigMap
      name: overlay-vars
      fieldPath: data.RDS_DB_USERNAME_KEY
    targets:
      - select:
          kind: ConfigMap
          name: plane-app-vars
        fieldPaths:
          - data.RDS_DB_USERNAME_KEY

  # ====== FROM secrets-vars.yaml (Secret) ======
  # DATABASE_URL: use component static-db-url when providing static URL; omit when using IRSA with RDS_SECRET_ARN

  - source:
      kind: Secret
      name: overlay-secret-vars
      fieldPath: stringData.REDIS_URL
    targets:
      - select:
          kind: Secret
          name: plane-app-secrets
        fieldPaths:
          - stringData.REDIS_URL

  - source:
      kind: Secret
      name: overlay-secret-vars
      fieldPath: stringData.AMQP_URL
    targets:
      - select:
          kind: Secret
          name: plane-app-secrets
        fieldPaths:
          - stringData.AMQP_URL
      - select:
          kind: Secret
          name: plane-pi-api-secrets
        fieldPaths:
          - stringData.AMQP_URL

  # AWS Secrets Manager ARNs in plane-app-secrets and plane-live-secrets
  - source:
      kind: ConfigMap
      name: overlay-vars
      fieldPath: data.AMAZONMQ_SECRET_ARN
    targets:
      - select:
          kind: Secret
          name: plane-app-secrets
        fieldPaths:
          - stringData.AMAZONMQ_SECRET_ARN

  - source:
      kind: ConfigMap
      name: overlay-vars
      fieldPath: data.ELASTICACHE_SECRET_ARN
    targets:
      - select:
          kind: Secret
          name: plane-app-secrets
        fieldPaths:
          - stringData.ELASTICACHE_SECRET_ARN
      - select:
          kind: Secret
          name: plane-live-secrets
        fieldPaths:
          - stringData.ELASTICACHE_SECRET_ARN

  - source:
      kind: ConfigMap
      name: overlay-vars
      fieldPath: data.RDS_SECRET_ARN
    targets:
      - select:
          kind: Secret
          name: plane-app-secrets
        fieldPaths:
          - stringData.RDS_SECRET_ARN

  # Application secret keys in plane-app-secrets
  - source:
      kind: Secret
      name: overlay-secret-vars
      fieldPath: stringData.SECRET_KEY
    targets:
      - select:
          kind: Secret
          name: plane-app-secrets
        fieldPaths:
          - stringData.SECRET_KEY

  - source:
      kind: Secret
      name: overlay-secret-vars
      fieldPath: stringData.AES_SECRET_KEY
    targets:
      - select:
          kind: Secret
          name: plane-app-secrets
        fieldPaths:
          - stringData.AES_SECRET_KEY
      - select:
          kind: Secret
          name: plane-pi-api-secrets
        fieldPaths:
          - stringData.AES_SECRET_KEY

  - source:
      kind: Secret
      name: overlay-secret-vars
      fieldPath: stringData.LIVE_SERVER_SECRET_KEY
    targets:
      - select:
          kind: Secret
          name: plane-app-secrets
        fieldPaths:
          - stringData.LIVE_SERVER_SECRET_KEY

  # OpenSearch configuration in plane-opensearch-secrets
  - source:
      kind: Secret
      name: overlay-secret-vars
      fieldPath: stringData.OPENSEARCH_ENABLED
    targets:
      - select:
          kind: Secret
          name: plane-opensearch-secrets
        fieldPaths:
          - stringData.OPENSEARCH_ENABLED

  - source:
      kind: Secret
      name: overlay-secret-vars
      fieldPath: stringData.OPENSEARCH_URL
    targets:
      - select:
          kind: Secret
          name: plane-opensearch-secrets
        fieldPaths:
          - stringData.OPENSEARCH_URL
  # OPENSEARCH_USERNAME/PASSWORD: use component opensearch-external-auth when needed

  # MinIO/S3 configuration in plane-doc-store-secrets (AWS_ACCESS_KEY_ID/SECRET: use component s3-static-credentials when needed)
  - source:
      kind: Secret
      name: overlay-secret-vars
      fieldPath: stringData.AWS_S3_ENDPOINT_URL
    targets:
      - select:
          kind: Secret
          name: plane-doc-store-secrets
        fieldPaths:
          - stringData.AWS_S3_ENDPOINT_URL

  - source:
      kind: Secret
      name: overlay-secret-vars
      fieldPath: stringData.AWS_S3_BUCKET_NAME
    targets:
      - select:
          kind: Secret
          name: plane-doc-store-secrets
        fieldPaths:
          - stringData.AWS_S3_BUCKET_NAME

  - source:
      kind: Secret
      name: overlay-secret-vars
      fieldPath: stringData.AWS_REGION
    targets:
      - select:
          kind: Secret
          name: plane-doc-store-secrets
        fieldPaths:
          - stringData.AWS_REGION

  # Live service REDIS_URL in plane-live-secrets
  - source:
      kind: Secret
      name: overlay-secret-vars
      fieldPath: stringData.REDIS_URL
    targets:
      - select:
          kind: Secret
          name: plane-live-secrets
        fieldPaths:
          - stringData.REDIS_URL

  # Silo service infrastructure URLs in plane-silo-secrets (DATABASE_URL: use component static-db-url when needed)
  - source:
      kind: Secret
      name: overlay-secret-vars
      fieldPath: stringData.REDIS_URL
    targets:
      - select:
          kind: Secret
          name: plane-silo-secrets
        fieldPaths:
          - stringData.REDIS_URL

  - source:
      kind: Secret
      name: overlay-secret-vars
      fieldPath: stringData.AMQP_URL
    targets:
      - select:
          kind: Secret
          name: plane-silo-secrets
        fieldPaths:
          - stringData.AMQP_URL

  - source:
      kind: ConfigMap
      name: overlay-vars
      fieldPath: data.OPENSEARCH_INDEX_PREFIX
    targets:
      - select:
          kind: Secret
          name: plane-opensearch-secrets
        fieldPaths:
          - stringData.OPENSEARCH_INDEX_PREFIX