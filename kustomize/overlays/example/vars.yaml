# This ConfigMap holds all the variables for this overlay
# It won't be deployed to the cluster - it's just used as a source for replacements
apiVersion: v1
kind: ConfigMap
metadata:
  name: overlay-vars
  annotations:
    # This annotation tells Kustomize to not deploy this ConfigMap
    config.kubernetes.io/local-config: "true"
data:
  # Application version used across all images and config
  APP_VERSION: "v2.3.4"
  
  # Domain configuration
  APP_DOMAIN: "your-domain.example.com"
  
  # Web URL (with protocol)
  WEB_URL: "https://your-domain.example.com"
  
  # CORS allowed origins (comma-separated)
  CORS_ALLOWED_ORIGINS: "https://your-domain.example.com"
  
  # Ingress class
  INGRESS_CLASS: "nginx"
  
  # AWS ALB SSL Certificate ARN (required when using ALB ingress controller)
  ALB_SSL_CERT_ARN: ""

  # Other configuration flags
  IS_AIRGAPPED: "0"

  # Optional: AWS Secrets Manager ARNs (non-sensitive, used to fetch credentials)
  AMAZONMQ_SECRET_ARN: "arn:aws:secretsmanager:us-east-1:123456789012:secret:your-mq-secret"
  ELASTICACHE_SECRET_ARN: "arn:aws:secretsmanager:us-east-1:123456789012:secret:your-redis-secret"
  RDS_SECRET_ARN: "arn:aws:secretsmanager:us-east-1:123456789012:secret:your-rds-secret"

  # Optional: EKS IRSA and Pod Identity for Plane workloads (ServiceAccount annotation)
  PLANE_SERVICE_ACCOUNT_ROLE_ARN: "arn:aws:iam::123456789012:role/PlaneS3Role"
