# This ConfigMap holds all the variables for this overlay
# It won't be deployed to the cluster - it's just used as a source for replacements
apiVersion: v1
kind: ConfigMap
metadata:
  name: overlay-vars
  annotations:
    # This annotation tells Kustomize to not deploy this ConfigMap
    config.kubernetes.io/local-config: "true"
data:
  # Application version used across all images and config
  APP_VERSION: "v2.3.4"
  
  # Domain configuration
  APP_DOMAIN: "gp.loadtest.plane.town"
  
  # Web URL (with protocol)
  WEB_URL: "http://gp.loadtest.plane.town"
  
  # CORS allowed origins (comma-separated)
  CORS_ALLOWED_ORIGINS: "http://gp.loadtest.plane.town,https://gp.loadtest.plane.town"
  
  # Ingress class
  INGRESS_CLASS: "nginx"
  
  # AWS ALB SSL Certificate ARN (required when using ALB ingress controller)
  ALB_SSL_CERT_ARN: ""

  # Other configuration flags
  IS_AIRGAPPED: "0"

  # Optional: AWS Secrets Manager ARNs (non-sensitive, used to fetch credentials)
  AMAZONMQ_SECRET_ARN: "arn:aws:secretsmanager:us-east-1:426043895157:secret:gp/api/mq/secrets-GMMWoG"
  ELASTICACHE_SECRET_ARN: "arn:aws:secretsmanager:us-east-1:426043895157:secret:gp/api/redis/secrets-K0zoig"
  RDS_SECRET_ARN: "arn:aws:secretsmanager:us-east-1:426043895157:secret:gp/api/secrets-oFsQ2M"

  # Optional: EKS IRSA for Plane workloads (ServiceAccount annotation)
  PLANE_SERVICE_ACCOUNT_ROLE_ARN: "arn:aws:iam::426043895157:role/PlaneS3Role"
