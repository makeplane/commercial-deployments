apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

# ============================================================
# CUSTOM CA CERTIFICATE
# ============================================================
# Mounts a custom CA certificate into all plane workload containers
# at /etc/ssl/certs/customCA.crt, and automatically sets:
#   NODE_EXTRA_CA_CERTS=/etc/ssl/certs/customCA.crt          (Node.js — appends, does not replace)
#   REQUESTS_CA_BUNDLE=/combined-ca/ca-bundle.crt             (Python requests)
#   AWS_CA_BUNDLE=/combined-ca/ca-bundle.crt                  (Python boto3/botocore)
#
# /combined-ca/ca-bundle.crt is built at pod startup by an init container
# that concatenates the system CA bundle with the custom CA, so that standard
# TLS endpoints (e.g. AWS APIs) remain trusted alongside internal services.
#
# Each pod's init container uses the same image as its main container — no
# additional images to procure or scan. The `images` transformer in your
# overlay automatically applies the correct pinned tag to both.
#
# Usage:
#   1. Paste your CA certificate (PEM format) into customCA.crt
#      (see customCA.crt.example for the expected format)
#   2. Enable this component in your overlay's kustomization.yaml:
#      components:
#        - ../../components/custom-ca
# ============================================================

configMapGenerator:
  # Contains the raw certificate file — mounted as a volume
  - name: plane-custom-ca
    files:
      - customCA.crt
    options:
      disableNameSuffixHash: true

  # Contains the env vars that point runtimes at the cert
  - name: plane-custom-ca-env
    literals:
      - REQUESTS_CA_BUNDLE=/combined-ca/ca-bundle.crt
      - NODE_EXTRA_CA_CERTS=/etc/ssl/certs/customCA.crt
      - AWS_CA_BUNDLE=/combined-ca/ca-bundle.crt
    options:
      disableNameSuffixHash: true

patches:
  # ── Add volume to pod specs WITHOUT existing volumes ─────────────────────────
  # (all base deployments, pi-service, runner, jobs, monitor — but NOT email-service)
  - path: patches/add-ca-volume.json
    target:
      kind: Deployment
      labelSelector: "app.kubernetes.io/name=plane-enterprise,app.kubernetes.io/component!=email-service"
  - path: patches/add-ca-volume.json
    target:
      kind: Job
      labelSelector: "app.kubernetes.io/name=plane-enterprise"
  - path: patches/add-ca-volume.json
    target:
      kind: StatefulSet
      labelSelector: "app.kubernetes.io/name=plane-enterprise"

  # ── Append volume to email-service which already has existing volumes ─────────
  - path: patches/append-ca-volume.json
    target:
      kind: Deployment
      name: plane-email-service-wl

  # ── Add volumeMount to containers WITHOUT existing volumeMounts ──────────────
  # (all base deployments, pi-service, runner, iframely — but NOT email-service)
  - path: patches/add-ca-volumemount.json
    target:
      kind: Deployment
      labelSelector: "app.kubernetes.io/name=plane-enterprise,app.kubernetes.io/component!=email-service"
  - path: patches/add-ca-volumemount.json
    target:
      kind: Job
      labelSelector: "app.kubernetes.io/name=plane-enterprise"

  # ── Append volumeMount to containers WITH existing volumeMounts ──────────────
  # email-service already has tls-cert + spam-blacklist mounts
  - path: patches/append-ca-volumemount.json
    target:
      kind: Deployment
      name: plane-email-service-wl
  # monitor already has monitor-data mount
  - path: patches/append-ca-volumemount.json
    target:
      kind: StatefulSet
      name: plane-monitor

  # ── Inject env vars into containers WITH existing envFrom ────────────────────
  # (all deployments/jobs/statefulsets EXCEPT iframely which has no envFrom)
  - path: patches/append-ca-envfrom.json
    target:
      kind: Deployment
      labelSelector: "app.kubernetes.io/name=plane-enterprise,app.kubernetes.io/component!=iframely"
  - path: patches/append-ca-envfrom.json
    target:
      kind: Job
      labelSelector: "app.kubernetes.io/name=plane-enterprise"
  - path: patches/append-ca-envfrom.json
    target:
      kind: StatefulSet
      labelSelector: "app.kubernetes.io/name=plane-enterprise"

  # ── Inject env vars into iframely which has NO envFrom yet ───────────────────
  - path: patches/add-ca-envfrom.json
    target:
      kind: Deployment
      name: plane-iframely-wl

  # ── Add combined-ca emptyDir volume (runs after custom-ca volume exists) ─────
  # All targets now have a volumes array, so always append with /-
  - path: patches/append-combined-ca-volume.json
    target:
      kind: Deployment
      labelSelector: "app.kubernetes.io/name=plane-enterprise"
  - path: patches/append-combined-ca-volume.json
    target:
      kind: Job
      labelSelector: "app.kubernetes.io/name=plane-enterprise"
  - path: patches/append-combined-ca-volume.json
    target:
      kind: StatefulSet
      labelSelector: "app.kubernetes.io/name=plane-enterprise"

  # ── Append combined-ca volumeMount to containers ─────────────────────────────
  # All targets now have a volumeMounts array, so always append with /-
  - path: patches/append-combined-ca-volumemount.json
    target:
      kind: Deployment
      labelSelector: "app.kubernetes.io/name=plane-enterprise"
  - path: patches/append-combined-ca-volumemount.json
    target:
      kind: Job
      labelSelector: "app.kubernetes.io/name=plane-enterprise"
  - path: patches/append-combined-ca-volumemount.json
    target:
      kind: StatefulSet
      labelSelector: "app.kubernetes.io/name=plane-enterprise"

  # ── Add init container that builds the combined CA bundle ─────────────────────
  # Default image is makeplane/backend-commercial; overrides below correct each
  # service to use its own (already-scanned) image. Label-selector patches
  # silently no-op when an optional component is not included in the overlay.
  - path: patches/add-ca-init-container.json
    target:
      kind: Deployment
      labelSelector: "app.kubernetes.io/name=plane-enterprise"
  - path: patches/add-ca-init-container.json
    target:
      kind: Job
      labelSelector: "app.kubernetes.io/name=plane-enterprise"
  - path: patches/add-ca-init-container.json
    target:
      kind: StatefulSet
      labelSelector: "app.kubernetes.io/name=plane-enterprise"

  # ── Per-service init container image overrides ────────────────────────────────
  - patch: |
      - op: replace
        path: /spec/template/spec/initContainers/0/image
        value: makeplane/silo-commercial
    target:
      kind: Deployment
      labelSelector: "app.kubernetes.io/name=plane-enterprise,app.kubernetes.io/component=silo"
  - patch: |
      - op: replace
        path: /spec/template/spec/initContainers/0/image
        value: makeplane/web-commercial
    target:
      kind: Deployment
      labelSelector: "app.kubernetes.io/name=plane-enterprise,app.kubernetes.io/component=web"
  - patch: |
      - op: replace
        path: /spec/template/spec/initContainers/0/image
        value: makeplane/space-commercial
    target:
      kind: Deployment
      labelSelector: "app.kubernetes.io/name=plane-enterprise,app.kubernetes.io/component=space"
  - patch: |
      - op: replace
        path: /spec/template/spec/initContainers/0/image
        value: makeplane/admin-commercial
    target:
      kind: Deployment
      labelSelector: "app.kubernetes.io/name=plane-enterprise,app.kubernetes.io/component=admin"
  - patch: |
      - op: replace
        path: /spec/template/spec/initContainers/0/image
        value: makeplane/live-commercial
    target:
      kind: Deployment
      labelSelector: "app.kubernetes.io/name=plane-enterprise,app.kubernetes.io/component=live"
  - patch: |
      - op: replace
        path: /spec/template/spec/initContainers/0/image
        value: makeplane/iframely
    target:
      kind: Deployment
      labelSelector: "app.kubernetes.io/name=plane-enterprise,app.kubernetes.io/component=iframely"
  - patch: |
      - op: replace
        path: /spec/template/spec/initContainers/0/image
        value: makeplane/monitor-commercial
    target:
      kind: StatefulSet
      labelSelector: "app.kubernetes.io/name=plane-enterprise,app.kubernetes.io/component=monitor"
  - patch: |
      - op: replace
        path: /spec/template/spec/initContainers/0/image
        value: makeplane/email-commercial
    target:
      kind: Deployment
      labelSelector: "app.kubernetes.io/name=plane-enterprise,app.kubernetes.io/component=email-service"
  - patch: |
      - op: replace
        path: /spec/template/spec/initContainers/0/image
        value: makeplane/node-runner-commercial
    target:
      kind: Deployment
      labelSelector: "app.kubernetes.io/name=plane-enterprise,app.kubernetes.io/component=node-runner"
  # pi-service (Deployments)
  - patch: |
      - op: replace
        path: /spec/template/spec/initContainers/0/image
        value: makeplane/plane-pi-commercial
    target:
      kind: Deployment
      labelSelector: "app.kubernetes.io/name=plane-enterprise,app.kubernetes.io/component in (pi-api,pi-beat,pi-worker)"
  # pi-service (Job)
  - patch: |
      - op: replace
        path: /spec/template/spec/initContainers/0/image
        value: makeplane/plane-pi-commercial
    target:
      kind: Job
      labelSelector: "app.kubernetes.io/name=plane-enterprise,app.kubernetes.io/component=pi-migrator"
