apiVersion: v1
kind: ConfigMap
metadata:
  name: plane-node-runner-vars
  namespace: plane
data:
  NODE_ENV: "production"
  PORT: "3000"

  # Execution configuration
  EXECUTION_TIMEOUT_MS: "10000"
  INIT_TIMEOUT_MS: "5000"
  ISOLATE_MEMORY_MB: "128"

  # Internal Kubernetes service URL for the Plane API
  API_BASE_URL: "http://plane-api.plane-ns.svc.cluster.local:8000"

  # Control service base URL (set per environment)
  CONTROL_SERVICE_BASE_URL: ""
