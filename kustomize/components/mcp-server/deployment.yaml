apiVersion: apps/v1
kind: Deployment
metadata:
  name: plane-mcp-server
  namespace: plane
  labels:
    app.kubernetes.io/name: plane-enterprise
    app.kubernetes.io/component: mcp-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: plane-enterprise
      app.kubernetes.io/component: mcp-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: plane-enterprise
        app.kubernetes.io/component: mcp-server
    spec:
      serviceAccountName: plane-srv-account
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: mcp-server
          image: makeplane/plane-mcp-server
          imagePullPolicy: Always
          ports:
            - containerPort: 8211
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            runAsNonRoot: true
            runAsUser: 1000
          envFrom:
            - configMapRef:
                name: plane-mcp-server-vars
            - secretRef:
                name: plane-mcp-server-secrets
          readinessProbe:
            tcpSocket:
              port: 8211
            failureThreshold: 30
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 1
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
