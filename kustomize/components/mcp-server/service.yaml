apiVersion: v1
kind: Service
metadata:
  name: plane-mcp-server
  namespace: plane
  labels:
    app.kubernetes.io/name: plane-enterprise
    app.kubernetes.io/component: mcp-server
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: plane-enterprise
    app.kubernetes.io/component: mcp-server
  ports:
    - name: mcp-8211
      port: 8211
      protocol: TCP
      targetPort: 8211
