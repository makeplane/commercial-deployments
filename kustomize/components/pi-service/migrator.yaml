apiVersion: batch/v1
kind: Job
metadata:
  name: plane-pi-migrator
  namespace: plane
  labels:
    app.kubernetes.io/name: plane-enterprise
    app.kubernetes.io/component: pi-migrator
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 7200  # Auto-cleanup after 2 hours
  template:
    metadata:
      labels:
        app.kubernetes.io/name: plane-enterprise
        app.kubernetes.io/component: pi-migrator
      annotations:
        # Update this timestamp to force a new job creation
        # Use: date +%Y%m%d-%H%M%S
        run-timestamp: "20250209-000000"
    spec:
      restartPolicy: OnFailure
      serviceAccountName: plane-srv-account
      containers:
        - name: pi-migrator
          image: artifacts.plane.so/makeplane/plane-pi-commercial:v2.3.4
          imagePullPolicy: Always
          command:
            - ./bin/entrypoint-migrator.sh
          envFrom:
            - configMapRef:
                name: plane-pi-api-vars
            - secretRef:
                name: plane-pi-api-secrets
            - secretRef:
                name: plane-doc-store-secrets
            - secretRef:
                name: plane-opensearch-secrets
          resources:
            requests:
              memory: 50Mi
              cpu: 50m
            limits:
              memory: 1000Mi
              cpu: 500m
