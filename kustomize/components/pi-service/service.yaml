apiVersion: v1
kind: Service
metadata:
  name: plane-pi-api
  namespace: plane
  labels:
    app.kubernetes.io/name: plane-enterprise
    app.kubernetes.io/component: pi-api
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app.kubernetes.io/name: plane-enterprise
    app.kubernetes.io/component: pi-api
  ports:
    - name: pi-api-8000
      port: 8000
      protocol: TCP
      targetPort: 8000
