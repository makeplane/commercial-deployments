apiVersion: v1
kind: ConfigMap
metadata:
  name: plane-pi-api-vars
  namespace: plane
data:
  DEBUG: "0"
  FASTAPI_APP_HOST: "0.0.0.0"
  FASTAPI_APP_WORKERS: "1"

  PLANE_FRONTEND_URL: "http://plane.example.com"
  PLANE_API_HOST: "http://plane.example.com"

  FEATURE_FLAG_SERVER_BASE_URL: "http://plane-monitor:8080"
  PI_BASE_PATH: "/pi"
  CORS_ALLOWED_ORIGINS: "http://plane.example.com,https://plane.example.com"
  PLANE_OAUTH_REDIRECT_URI: "http://plane.example.com/pi/api/v1/oauth/callback/"
  PLANE_OAUTH_STATE_EXPIRY_SECONDS: "82800"

  OPENAI_BASE_URL: ""
  CLAUDE_BASE_URL: ""
  COHERE_BASE_URL: ""
  GROQ_BASE_URL: ""

  CUSTOM_LLM_ENABLED: "true"
  CUSTOM_LLM_MODEL_KEY: "gpt-oss-120b"
  CUSTOM_LLM_BASE_URL: ""
  CUSTOM_LLM_NAME: "GPT-OSS-120B"
  CUSTOM_LLM_MAX_TOKENS: "128000"
  CUSTOM_LLM_PROVIDER: "bedrock"
  CUSTOM_LLM_AWS_REGION: "us-east-2"
  MODEL_CUSTOM_LLM_API_KEY: ""

  EMBEDDING_MODEL: "bedrock/amazon.titan-embed-text-v1"
  OPENSEARCH_ML_MODEL_ID: ""

  BR_AWS_ACCESS_KEY_ID: ""
  BR_AWS_REGION: "us-east-1"

  CELERY_VECTOR_SYNC_ENABLED: "0"
  CELERY_VECTOR_SYNC_INTERVAL: "3"
  CELERY_WORKSPACE_PLAN_SYNC_ENABLED: "0"
  CELERY_WORKSPACE_PLAN_SYNC_INTERVAL: "86400"
  CELERY_DOCS_SYNC_ENABLED: "0"
  CELERY_DOCS_SYNC_INTERVAL: "86400"

  # AWS Secrets Manager key mappings (overridden per-environment via overlays)
  RABBITMQ_PASSWORD_KEY: ""
  RABBITMQ_USER_KEY: ""

  RDS_DB_HOST_KEY: ""
  RDS_DB_NAME_KEY: ""
  RDS_DB_PASSWORD_KEY: ""
  RDS_DB_PORT_KEY: ""
  RDS_DB_USERNAME_KEY: ""

  FOLLOWER_RDS_DB_HOST_KEY: ""
  FOLLOWER_RDS_DB_NAME_KEY: ""
  FOLLOWER_RDS_DB_PASSWORD_KEY: ""
  FOLLOWER_RDS_DB_PORT_KEY: ""
  FOLLOWER_RDS_DB_USERNAME_KEY: ""

  # AWS Secrets Manager ARNs (replaced at overlay time)
  RDS_SECRET_ARN: ""
  AMAZONMQ_SECRET_ARN: ""
  FOLLOWER_RDS_SECRET_ARN: ""
  MODEL_SECRET_ARN: ""

  AWS_SECRET_CACHE_TTL: "300"
