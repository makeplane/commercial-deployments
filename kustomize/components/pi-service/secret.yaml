apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: plane-pi-api-secrets
  namespace: plane
stringData:
  # Static fallback (optional)
  PLANE_PI_DATABASE_URL: ""
  FOLLOWER_POSTGRES_URI: ""
  AMQP_URL: ""

  # App secrets
  AES_SECRET_KEY: ""
  PI_INTERNAL_SECRET: ""

  # LLM / model API keys
  COHERE_API_KEY: ""
  CUSTOM_LLM_API_KEY: ""

  # Bedrock static credentials (omit when using IRSA / Pod Identity)
  BR_AWS_SECRET_ACCESS_KEY: ""
  BR_AWS_SESSION_TOKEN: ""

  # AWS Secrets Manager ARNs (replaced at overlay time)
  RDS_SECRET_ARN: ""
  AMAZONMQ_SECRET_ARN: ""
  FOLLOWER_RDS_SECRET_ARN: ""
  MODEL_SECRET_ARN: ""
