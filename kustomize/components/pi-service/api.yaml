apiVersion: apps/v1
kind: Deployment
metadata:
  name: plane-pi-api-wl
  namespace: plane
  labels:
    app.kubernetes.io/name: plane-enterprise
    app.kubernetes.io/component: pi-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: plane-enterprise
      app.kubernetes.io/component: pi-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: plane-enterprise
        app.kubernetes.io/component: pi-api
    spec:
      serviceAccountName: plane-srv-account
      containers:
        - name: pi-api
          image: makeplane/plane-pi-commercial:v2.3.4
          imagePullPolicy: Always
          command:
            - ./bin/entrypoint-api.sh
          envFrom:
            - configMapRef:
                name: plane-pi-api-vars
            - secretRef:
                name: plane-pi-api-secrets
            - secretRef:
                name: plane-doc-store-secrets
            - secretRef:
                name: plane-opensearch-secrets
          readinessProbe:
            httpGet:
              path: /pi/
              port: 8000
            failureThreshold: 30
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 1
          resources:
            requests:
              memory: 50Mi
              cpu: 50m
            limits:
              memory: 1000Mi
              cpu: 500m
