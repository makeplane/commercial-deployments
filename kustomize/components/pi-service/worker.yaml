apiVersion: apps/v1
kind: Deployment
metadata:
  name: plane-pi-worker-wl
  namespace: plane
  labels:
    app.kubernetes.io/name: plane-enterprise
    app.kubernetes.io/component: pi-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: plane-enterprise
      app.kubernetes.io/component: pi-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: plane-enterprise
        app.kubernetes.io/component: pi-worker
    spec:
      serviceAccountName: plane-srv-account
      containers:
        - name: pi-worker
          image: makeplane/plane-pi-commercial:v2.3.4
          imagePullPolicy: Always
          command:
            - ./bin/entrypoint-celery-worker.sh
          envFrom:
            - configMapRef:
                name: plane-pi-api-vars
            - secretRef:
                name: plane-pi-api-secrets
            - secretRef:
                name: plane-doc-store-secrets
            - secretRef:
                name: plane-opensearch-secrets
          resources:
            requests:
              memory: 50Mi
              cpu: 50m
            limits:
              memory: 1000Mi
              cpu: 500m
